version: "3.8"

services:
  # =====================================
  # DATABASE LAYER
  # =====================================

  postgres:
    image: postgres:15-alpine
    container_name: rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
      POSTGRES_USER: ${POSTGRES_USER:-rag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  mongodb:
    image: mongo:7
    container_name: rag-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password123}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-somatek}
    volumes:
      - ./data/mongodb:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  minio:
    image: minio/minio:latest
    container_name: rag-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  minio-init:
    image: minio/mc:latest
    container_name: rag-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing local/somatek-documents;
      mc anonymous set none local/somatek-documents;
      echo 'MinIO bucket somatek-documents is ready';
      exit 0;
      "
    networks:
      - rag-network

  # =====================================
  # ML SERVICES LAYER
  # =====================================

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    restart: unless-stopped
    profiles: ["docker-ollama"]   # disabled by default; use --profile docker-ollama if not running Ollama natively
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=2
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q nomic-embed-text"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - rag-network
    # Pull model on first start
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 10
        ollama pull llama3.2:3b
        ollama pull nomic-embed-text
        wait

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: rag-qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q 200'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-network

  textcat:
    build:
      context: ./services/textcat
      dockerfile: Dockerfile
    container_name: rag-textcat
    restart: unless-stopped
    volumes:
      - ./models/textCat:/app/model:ro
    ports:
      - "8001:8000"
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - rag-network

  nllb-translate:
    build:
      context: ./services/nllb-translate
      dockerfile: Dockerfile
    container_name: rag-nllb-translate
    restart: unless-stopped
    volumes:
      - ./models/nllb-kin-ct2:/app/model:ro
    ports:
      - "8002:8000"
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - rag-network

  # =====================================
  # BACKEND LAYER
  # =====================================

  java-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag-java-backend
    restart: unless-stopped
    profiles: ["prod"]   # only starts with: docker compose --profile prod up
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      textcat:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-rag_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-rag_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - SPRING_DATA_MONGODB_URI=mongodb://admin:password123@mongodb:27017/somatek?authSource=admin
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-this}
      - TEXTCAT_SERVICE_URL=http://textcat:8000
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - NLLB_SERVICE_URL=http://nllb-translate:8000
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rag-network

  # =====================================
  # REVERSE PROXY / FRONTEND
  # =====================================

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: somatek-nginx
    restart: unless-stopped
    profiles: ["prod"]
    depends_on:
      java-backend:
        condition: service_started
    ports:
      - "80:80"
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  ollama-data:
  models-data:
  mongodb-data:
  qdrant-data:
