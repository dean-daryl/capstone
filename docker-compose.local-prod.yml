# Local production test — HTTP only, no SSL
# Usage: docker compose -f docker-compose.prod.yml -f docker-compose.local-prod.yml --env-file .env.local-prod up -d --build
services:
  nginx:
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
      - frontend-static:/usr/share/nginx/html:ro
    command: ["nginx", "-g", "daemon off;"]
