spring.application.name=SomaTekBackEnd

# ── H2 Database (replaces PostgreSQL) ──
spring.datasource.url=jdbc:h2:file:${SOMATEK_DATA_DIR:${user.home}/.somatek/data}/somatek;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

server.port=${PORT:8080}

# ── Disable MongoDB ──
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration,\
  org.springframework.ai.vectorstore.qdrant.autoconfigure.QdrantVectorStoreAutoConfiguration,\
  org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration

spring.data.mongodb.uri=
spring.data.mongodb.database=

# ── ChromaDB Vector Store (replaces Qdrant) ──
spring.ai.vectorstore.chroma.url=${CHROMA_URL:http://localhost:8000}
spring.ai.vectorstore.chroma.collection-name=somatek_documents
spring.ai.vectorstore.chroma.initialize-schema=true

# ── Ollama (unchanged) ──
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${LLAMA_MODEL_NAME:llama3.2:3b}
spring.ai.ollama.chat.options.temperature=0.5
spring.ai.ollama.chat.options.num-ctx=4096
spring.ai.ollama.chat.options.num-predict=512
spring.ai.ollama.chat.options.keep-alive=10m
spring.ai.ollama.embedding.model=nomic-embed-text
spring.ai.ollama.embedding.options.num-ctx=8192

ollama.read-timeout-minutes=${OLLAMA_READ_TIMEOUT_MINUTES:10}

# ── RAG settings ──
rag.chunk.size=${RAG_CHUNK_SIZE:500}
rag.chunk.overlap=${RAG_CHUNK_OVERLAP:50}
rag.search.top-k=${RAG_SEARCH_TOP_K:3}
rag.search.similarity-threshold=${RAG_SEARCH_SIMILARITY_THRESHOLD:0.2}

# ── JWT ──
token.secret=${JWT_SECRET:your-secret-key-change-this}
token.validity=18000

# ── Google OAuth (disabled in local mode) ──
google.oauth.client-id=disabled
google.oauth.client-secret=disabled
google.oauth.redirect-uri=http://localhost:8080/auth/grantcode

# ── External Services ──
textcat.service.url=${TEXTCAT_SERVICE_URL:http://localhost:8001}
nllb.service.url=${NLLB_SERVICE_URL:http://localhost:8002}
textcat.service.threshold=${TEXTCAT_SERVICE_THRESHOLD:0.5}

# ── Llama API (title generation) ──
llama.apiUrl=${LLAMA_API_URL:http://localhost:11434/v1/chat/completions}
llama.modelName=${LLAMA_MODEL_NAME:llama3.2:3b}
llama.apiKey=${LLAMA_API_KEY:ollama}

# ── Local File Storage (replaces MinIO) ──
local.storage.base-dir=${SOMATEK_DATA_DIR:${user.home}/.somatek/data}/files

# ── Seed Data ──
somatek.seed.email=${SOMATEK_SEED_EMAIL:teacher@school.rw}
somatek.seed.password=${SOMATEK_SEED_PASSWORD:changeme}

# ── Frontend (serve React build as static files) ──
spring.web.resources.static-locations=classpath:/static/

# ── File Upload ──
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Swagger ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
