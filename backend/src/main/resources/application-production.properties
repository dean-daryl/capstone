spring.application.name=SomaTekBackEnd

# Exclude Chroma auto-config (Qdrant is used in production)
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Server Configuration
server.port=8080

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
token.secret=${JWT_SECRET}
token.validity=18000

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=somatek

# Placeholder values for external services
google.oauth.client-id=disabled
google.oauth.client-secret=disabled
google.oauth.redirect.uri=http://localhost:8080/auth/disabled

# Text Classification Service
textcat.service.url=${TEXTCAT_SERVICE_URL:http://textcat:8000}
textcat.service.threshold=0.5
nllb.service.url=${NLLB_SERVICE_URL:http://nllb-translate:8000}

# Llama API (using Ollama instead)
llama.apiUrl=${OLLAMA_BASE_URL:http://ollama:11434}/v1/chat/completions
llama.modelName=llama3.2:3b
llama.apiKey=ollama

# Spring AI - Ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://ollama:11434}
spring.ai.ollama.chat.model=llama3.2:3b
spring.ai.ollama.chat.options.temperature=0.5
spring.ai.ollama.chat.options.num-ctx=4096
spring.ai.ollama.chat.options.num-predict=512
spring.ai.ollama.chat.options.keep-alive=10m
spring.ai.ollama.embedding.model=nomic-embed-text

# Spring AI - Qdrant Vector Store
spring.ai.vectorstore.qdrant.host=qdrant
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=somatek_documents
spring.ai.vectorstore.qdrant.initialize-schema=true

# Ollama HTTP timeout (minutes) — increase for large documents
ollama.read-timeout-minutes=${OLLAMA_READ_TIMEOUT_MINUTES:10}

# RAG Configuration
rag.chunk.size=500
rag.chunk.overlap=50
rag.search.top-k=3
rag.search.similarity-threshold=0.2

# MinIO
minio.endpoint=${MINIO_ENDPOINT:http://minio:9000}
minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
minio.bucket-name=somatek-documents

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
