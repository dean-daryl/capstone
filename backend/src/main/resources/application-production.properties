spring.application.name=SomaTekBackEnd

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Server Configuration
server.port=8080

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
token.secret=${JWT_SECRET}
token.validity=18000

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=somatek

# Placeholder values for external services
google.oauth.client-id=disabled
google.oauth.client-secret=disabled
google.oauth.redirect.uri=http://localhost:8080/auth/disabled

# Text Classification Service
textcat.service.url=${TEXTCAT_SERVICE_URL:http://textcat:8000}
textcat.service.threshold=0.5

# Llama API (using Ollama instead)
llama.apiUrl=http://ollama:11434/v1/chat/completions
llama.modelName=qwen2.5:3b
llama.apiKey=ollama

# Spring AI - Ollama
spring.ai.ollama.base-url=http://ollama:11434
spring.ai.ollama.chat.model=qwen2.5:1.5b
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.chat.options.num-ctx=2048
spring.ai.ollama.chat.options.num-predict=512
spring.ai.ollama.chat.options.keep-alive=60m
spring.ai.ollama.embedding.model=nomic-embed-text

# Spring AI - Qdrant Vector Store
spring.ai.vectorstore.qdrant.host=qdrant
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=somatek_documents
spring.ai.vectorstore.qdrant.initialize-schema=true

# RAG Configuration
rag.chunk.size=200
rag.chunk.overlap=30
rag.search.top-k=3
rag.search.similarity-threshold=0.5

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
