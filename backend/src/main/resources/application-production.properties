spring.application.name=SomaTekBackEnd

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Server Configuration
server.port=8080

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
token.secret=${JWT_SECRET}
token.validity=18000

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}
spring.data.mongodb.database=somatek

# Placeholder values for external services
google.oauth.client-id=disabled
google.oauth.client-secret=disabled
google.oauth.redirect.uri=http://localhost:8080/auth/disabled

# Eden AI (disabled)
edenAi.ner.apiUrl=http://localhost:8080/disabled
edenAi.token=disabled

# Llama API (using Ollama instead)
llama.apiUrl=http://ollama:11434/api/chat
llama.modelName=qwen2.5:3b
llama.apiKey=not-needed-for-ollama
