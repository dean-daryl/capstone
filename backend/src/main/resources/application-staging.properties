spring.application.name=SomaTekBackEnd

# Exclude Chroma auto-config (Qdrant is used in staging)
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.chroma.autoconfigure.ChromaVectorStoreAutoConfiguration

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://dpg-ct247te8ii6s73fki4h0-a.oregon-postgres.render.com:5432/somatek_backend
spring.datasource.username=somatek_backend_user
spring.datasource.password=${DB_PASSWORD}

# JPA Settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

springdoc.api-docs.path=/public/api-docs
springdoc.swagger-ui.path=/public/swagger-ui.html

server.port=${PORT:8080}

#Mongo
spring.data.mongodb.uri=mongodb+srv://admin:mongopassword@somatekai.izic6.mongodb.net/
spring.data.mongodb.database=somatekai
#Jwt
token.secret=${TOKEN_SECRET}
token.validity=18000

#GCP credentials
google.oauth.client-id=<GCP_CLIENT_ID>
google.oauth.redirect.uri=http://localhost:5173/auth/grantcode
google.oauth.client-secret=<CLIENT_SECRET>

# Text Classification Service
textcat.service.url=${TEXTCAT_SERVICE_URL:http://textcat:8000}
textcat.service.threshold=0.5
nllb.service.url=${NLLB_SERVICE_URL:http://nllb-translate:8000}

llama.apiUrl=https://api.groq.com/openai/v1/chat/completions
llama.modelName=llama3-70b-8192
llama.apiKey=${LLAMA_API_KEY}

# Spring AI - Ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://ollama:11434}
spring.ai.ollama.chat.model=qwen2.5:3b
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.embedding.model=nomic-embed-text

# Spring AI - Qdrant Vector Store
spring.ai.vectorstore.qdrant.host=${QDRANT_HOST:qdrant}
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=somatek_documents
spring.ai.vectorstore.qdrant.initialize-schema=true

# RAG Configuration
rag.chunk.size=500
rag.chunk.overlap=50
rag.search.top-k=8
rag.search.similarity-threshold=0.15

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
