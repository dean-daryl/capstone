spring.application.name=SomaTekBackEnd

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/somatek
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA Settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

springdoc.api-docs.path=/public/api-docs
springdoc.swagger-ui.path=/public/swagger-ui.html

server.port=${PORT:8080}

#Mongo
spring.data.mongodb.database=Somatek
spring.data.mongodb.uri=mongodb://mongo:27017/
#Jwt
token.secret=<TOKEN_SECRET>
token.validity=18000

#GCP credentials
google.oauth.client-id=<GCP_CLIENT_ID>
google.oauth.redirect.uri=http://localhost:5173/auth/grantcode
google.oauth.client-secret=<CLIENT_SECRET>

# Text Classification Service
textcat.service.url=http://localhost:8001
textcat.service.threshold=0.5

llama.apiUrl=http://localhost:11434/v1/chat/completions
llama.modelName=qwen2.5:3b
llama.apiKey=ollama

# Spring AI - Ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5:1.5b
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.chat.options.num-ctx=2048
spring.ai.ollama.chat.options.num-predict=512
spring.ai.ollama.chat.options.keep-alive=60m
spring.ai.ollama.embedding.model=nomic-embed-text

# Spring AI - Qdrant Vector Store
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.collection-name=somatek_documents
spring.ai.vectorstore.qdrant.initialize-schema=true

# RAG Configuration
rag.chunk.size=200
rag.chunk.overlap=30
rag.search.top-k=3
rag.search.similarity-threshold=0.5

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB