spring.application.name=SomaTekBackEnd


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rag_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rag_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

server.port=${PORT:8080}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://admin:password123@localhost:27017/somatek?authSource=admin}
spring.data.mongodb.database=somatek

token.secret=${JWT_SECRET:your-secret-key-change-this}
token.validity=18000

google.oauth.client-id=disabled
google.oauth.client-secret=disabled
google.oauth.redirect-uri=http://localhost:5173/auth/grantcode

textcat.service.url=${TEXTCAT_SERVICE_URL:http://localhost:8001}
textcat.service.threshold=${TEXTCAT_SERVICE_THRESHOLD:0.5}

llama.apiUrl=${LLAMA_API_URL:http://localhost:11434/v1/chat/completions}
llama.modelName=${LLAMA_MODEL_NAME:llama3.2:3b}
llama.apiKey=${LLAMA_API_KEY:ollama}

spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.model=${LLAMA_MODEL_NAME:llama3.2:3b}
spring.ai.ollama.chat.options.temperature=0.5
spring.ai.ollama.chat.options.num-ctx=4096
spring.ai.ollama.chat.options.num-predict=512
spring.ai.ollama.chat.options.keep-alive=10m
spring.ai.ollama.embedding.model=nomic-embed-text

spring.ai.vectorstore.qdrant.host=${QDRANT_HOST:localhost}
spring.ai.vectorstore.qdrant.port=${QDRANT_PORT:6334}
spring.ai.vectorstore.qdrant.collection-name=somatek_documents
spring.ai.vectorstore.qdrant.initialize-schema=true

ollama.read-timeout-minutes=${OLLAMA_READ_TIMEOUT_MINUTES:10}

rag.chunk.size=${RAG_CHUNK_SIZE:200}
rag.chunk.overlap=${RAG_CHUNK_OVERLAP:30}
rag.search.top-k=${RAG_SEARCH_TOP_K:3}
rag.search.similarity-threshold=${RAG_SEARCH_SIMILARITY_THRESHOLD:0.2}

minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
minio.bucket-name=${MINIO_BUCKET_NAME:somatek-documents}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
