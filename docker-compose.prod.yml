services:
  # =====================================
  # DATABASE LAYER
  # =====================================

  postgres:
    image: postgres:15-alpine
    container_name: somatek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - somatek-network

  mongodb:
    image: mongo:7
    container_name: somatek-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: somatek
    volumes:
      - ./data/mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - somatek-network

  minio:
    image: minio/minio:latest
    container_name: somatek-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - somatek-network

  minio-init:
    image: minio/mc:latest
    container_name: somatek-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/somatek-documents;
      mc anonymous set none local/somatek-documents;
      echo 'MinIO bucket somatek-documents is ready';
      exit 0;
      "
    networks:
      - somatek-network

  # =====================================
  # ML SERVICES LAYER
  # =====================================

  # Ollama runs natively via systemd (not in Docker) for better performance.
  # Managed by: systemctl {start|stop|restart} ollama
  # Config override: /etc/systemd/system/ollama.service.d/override.conf

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: somatek-qdrant
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q 200'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - somatek-network

  textcat:
    build:
      context: ./services/textcat
      dockerfile: Dockerfile
    container_name: somatek-textcat
    restart: unless-stopped
    volumes:
      - ./models/textCat:/app/model:ro
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - somatek-network

  nllb-translate:
    build:
      context: ./services/nllb-translate
      dockerfile: Dockerfile
    container_name: somatek-nllb-translate
    restart: unless-stopped
    volumes:
      - ./models/nllb-kin-ct2:/app/model:ro
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - somatek-network

  # =====================================
  # BACKEND LAYER
  # =====================================

  java-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: somatek-backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      textcat:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_DATA_MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/somatek?authSource=admin
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_URL=https://${DOMAIN}/minio-files
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - TEXTCAT_SERVICE_URL=http://textcat:8000
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - NLLB_SERVICE_URL=http://nllb-translate:8000
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - somatek-network

  # =====================================
  # FRONTEND BUILD
  # =====================================

  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: somatek-frontend-build
    volumes:
      - frontend-static:/app/dist
    # This service builds and exits — its only purpose is to populate the volume
    restart: "no"

  # =====================================
  # REVERSE PROXY
  # =====================================

  nginx:
    image: nginx:1.27-alpine
    container_name: somatek-nginx
    restart: unless-stopped
    depends_on:
      java-backend:
        condition: service_healthy
      frontend-build:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - frontend-static:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./data/certbot:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN}
    # nginx:alpine docker image auto-runs envsubst on /etc/nginx/templates/*.template
    # and outputs to /etc/nginx/conf.d/. We override the main config instead.
    command: >
      /bin/sh -c "
        envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/nginx.conf
        && nginx -g 'daemon off;'
      "
    networks:
      - somatek-network

networks:
  somatek-network:
    driver: bridge

volumes:
  frontend-static:
