name: Build NLLB Translation Service

on:
  push:
    tags:
      - 'nllb-v*'  # Trigger on nllb version tags like nllb-v0.1.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., nllb-v0.1.0)'
        required: true
        default: 'nllb-v0.1.0'

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x64
          - os: ubuntu-24.04-arm
            target: linux
            arch: arm64
          - os: macos-latest
            target: macos
            arch: arm64
          - os: windows-latest
            target: windows
            arch: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            pkg-config

      - name: Install Python dependencies
        working-directory: services/nllb-translate
        run: |
          python -m pip install --upgrade pip wheel
          pip install "setuptools<70" pyinstaller
          pip install -r requirements.txt

      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        working-directory: services/nllb-translate
        run: |
          pyinstaller --clean somatek-nllb.spec
          mv dist/somatek-nllb dist/somatek-nllb-${{ matrix.target }}-${{ matrix.arch }}

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        working-directory: services/nllb-translate
        run: |
          pyinstaller --clean somatek-nllb.spec
          mv dist/somatek-nllb.exe dist/somatek-nllb-windows-x64.exe

      - name: Create release artifacts (Unix)
        if: runner.os != 'Windows'
        working-directory: services/nllb-translate
        run: |
          mkdir -p release
          cp dist/somatek-nllb-${{ matrix.target }}-${{ matrix.arch }} release/
          cd release
          sha256sum somatek-nllb-${{ matrix.target }}-${{ matrix.arch }} > somatek-nllb-${{ matrix.target }}-${{ matrix.arch }}.sha256
        shell: bash

      - name: Create release artifacts (Windows)
        if: runner.os == 'Windows'
        working-directory: services/nllb-translate
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item dist/somatek-nllb-windows-x64.exe release/
          $hash = (Get-FileHash release/somatek-nllb-windows-x64.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  somatek-nllb-windows-x64.exe" | Out-File -Encoding ascii release/somatek-nllb-windows-x64.exe.sha256
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: somatek-nllb-${{ matrix.target }}-${{ matrix.arch }}
          path: services/nllb-translate/release/
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: somatek-nllb-*
          merge-multiple: true
          path: ./release

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'NOTES'
          # NLLB Translation Service Release

          Standalone binary for the Somatek NLLB Kinyarwanda translation service.
          No Python installation required.

          ## Installation

          ### Linux / macOS
          ```bash
          curl -fsSL https://raw.githubusercontent.com/dean-daryl/capstone/main/scripts/install-nllb.sh | bash
          ```

          Or specify a version:
          ```bash
          curl -fsSL https://raw.githubusercontent.com/dean-daryl/capstone/main/scripts/install-nllb.sh | bash -s -- --version nllb-v0.1.0
          ```

          ### Windows
          Download `somatek-nllb-windows-x64.exe` and the model archive from this release.

          ## Model Files
          The ~630MB CTranslate2 model (`somatek-nllb-model.tar.gz`) must be downloaded separately.
          The install script handles this automatically.

          ## Usage
          ```bash
          NLLB_MODEL_DIR=~/.somatek/models/nllb-kin-ct2 somatek-nllb
          ```

          ## Checksums
          See individual `.sha256` files for verification.
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: NLLB Translation Service ${{ steps.tag.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'alpha') }}
          generate_release_notes: true
