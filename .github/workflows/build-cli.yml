name: Build Somatek CLI

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write  # Required for creating releases

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x64
          - os: ubuntu-latest
            target: linux
            arch: arm64
          - os: macos-latest
            target: macos
            arch: arm64
          - os: macos-13  # Intel Mac
            target: macos
            arch: x64
          - os: windows-latest
            target: windows
            arch: x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js (for frontend builds)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Set up Java (for backend JAR)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
          cache-dependency-path: backend/pom.xml

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            libffi-dev \
            python3-dev \
            pkg-config

      - name: Install Python dependencies
        working-directory: somatek-cli
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller

      - name: Build frontend (if needed)
        run: |
          if [ -d "frontend" ]; then
            cd frontend
            npm ci
            npm run build
          fi
        shell: bash

      - name: Build backend JAR
        run: |
          if [ -d "backend" ]; then
            cd backend
            mvn clean package -DskipTests -q
          fi
        shell: bash

      - name: Install somatek-cli package
        working-directory: somatek-cli
        run: pip install -e .

      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        working-directory: somatek-cli
        run: |
          pyinstaller --clean somatek-cli.spec
          # Rename binary to include platform info
          mv dist/somatek dist/somatek-${{ matrix.target }}-${{ matrix.arch }}

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        working-directory: somatek-cli
        run: |
          pyinstaller --clean somatek-cli.spec
          # Rename binary to include platform info
          mv dist/somatek.exe dist/somatek-windows-x64.exe

      - name: Create release artifacts
        working-directory: somatek-cli
        run: |
          mkdir -p release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp dist/somatek-windows-x64.exe release/
            # Create checksum
            cd release
            certutil -hashfile somatek-windows-x64.exe SHA256 | findstr /i "sha256" > somatek-windows-x64.exe.sha256
          else
            cp dist/somatek-${{ matrix.target }}-${{ matrix.arch }} release/
            # Create checksum
            cd release
            sha256sum somatek-${{ matrix.target }}-${{ matrix.arch }} > somatek-${{ matrix.target }}-${{ matrix.arch }}.sha256
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: somatek-${{ matrix.target }}-${{ matrix.arch }}
          path: somatek-cli/release/
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: somatek-*
          merge-multiple: true
          path: ./release

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # Somatek CLI Release

          ## Installation

          ### Linux (x64)
          \`\`\`bash
          curl -fsSL https://somatek.com/install.sh | bash -s -- --version ${{ github.ref_name }}
          \`\`\`

          ### macOS (Apple Silicon)
          \`\`\`bash
          curl -fsSL https://somatek.com/install.sh | bash -s -- --version ${{ github.ref_name }}
          \`\`\`

          ### Windows
          Download and run: \`somatek-windows-x64.exe\`

          Or with PowerShell:
          \`\`\`powershell
          Invoke-WebRequest -Uri https://somatek.com/install.ps1 -OutFile install.ps1
          .\install.ps1 -Version "${{ github.ref_name }}"
          \`\`\`

          ## Checksums
          See individual .sha256 files for verification.

          ## Usage
          \`\`\`bash
          somatek setup    # First-time setup
          somatek start    # Start all services
          somatek status   # Check service status
          somatek stop     # Stop all services
          \`\`\`

          ## What's Changed
          - Self-contained binary (no Python/Java/Node prerequisites)
          - Offline-first deployment
          - Automatic model downloads on first run
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Somatek CLI ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          generate_release_notes: true
